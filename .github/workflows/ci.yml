name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-profile:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/spatial_engine/target/release
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.80.0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
          cache: true

      - name: Compile native Rust engine
        run: |
          cd spatial_engine
          cargo build --release

      - name: Run Go tests with race detector
        run: go test -v -race ./...

      - name: Run performance benchmarks
        run: go test -bench=Benchmark -benchmem ./spatial/...
